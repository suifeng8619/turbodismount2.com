<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0D0F"/>
      <stop offset="100%" style="stop-color:#141417"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF8C12"/>
      <stop offset="50%" style="stop-color:#F57200"/>
      <stop offset="100%" style="stop-color:#C95A00"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:transparent"/>
      <stop offset="50%" style="stop-color:#F57200"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Speed lines decoration -->
  <rect x="100" y="260" width="1000" height="2" fill="url(#line)" opacity="0.3"/>
  <rect x="150" y="370" width="900" height="2" fill="url(#line)" opacity="0.2"/>
  <!-- Main title -->
  <text x="600" y="290" text-anchor="middle" font-family="Arial Black, Helvetica, sans-serif" font-weight="900" font-size="72" letter-spacing="8" fill="url(#textGrad)">TURBO</text>
  <text x="600" y="370" text-anchor="middle" font-family="Arial Black, Helvetica, sans-serif" font-weight="900" font-size="72" letter-spacing="8" fill="url(#textGrad)">DISMOUNT 2</text>
  <!-- Subtitle -->
  <text x="600" y="420" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="22" letter-spacing="4" fill="#B0B0BE">WIKI &amp; GUIDES</text>
  <!-- Border accent -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#line)"/>
  <rect x="0" y="626" width="1200" height="4" fill="url(#line)"/>
</svg>
